[colors]
background = #170d02
background-alt = #221406
foreground = #FFFFFF
foreground-alt = #8C8C8C
accent = #83CAFA
urgent = #EC69A0

[bar/main]
width = 98%
height = 30
offset-x = 1%
offset-y = 8
radius = 10

fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
border-size = 0

padding-left = 2
padding-right = 2

module-margin-left = 1
module-margin-right = 1

font-0 = JetBrains Mono:size=10;2
font-1 = monospace:size=10;2

modules-left = i3
modules-center = title
modules-right = cpu ram volume tray date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3
override-redirect = false

[module/i3]
type = internal/i3

pin-workspaces = true
index-sort = true
wrapping-scroll = false

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.urgent}
label-mode-foreground = ${colors.foreground}

label-focused = %index%
label-focused-padding = 2
label-focused-background = ${colors.accent}
label-focused-foreground = ${colors.background}

label-unfocused = %index%
label-unfocused-padding = 2
label-unfocused-background = ${colors.background}
label-unfocused-foreground = ${colors.foreground-alt}

label-visible = %index%
label-visible-padding = 2
label-visible-background = ${colors.background-alt}
label-visible-foreground = ${colors.foreground}

label-urgent = %index%
label-urgent-padding = 2
label-urgent-background = ${colors.urgent}
label-urgent-foreground = ${colors.foreground}

[module/title]
type = internal/xwindow
format = <label>
label = %title:0:70:...%
label-foreground = ${colors.foreground-alt}

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage%%

[module/ram]
type = internal/memory
interval = 2
format = <label>
label = RAM %percentage_used%%

[module/volume]
type = custom/script
interval = 2
exec = pactl get-sink-volume @DEFAULT_SINK@ 2>/dev/null | grep -o '[0-9]*%' | head -1 | awk '{print "VOL " $1}'
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
click-right = pavucontrol

[module/tray]
type = internal/tray
format-margin = 1
tray-spacing = 6px

[module/date]
type = internal/date
interval = 1

date = %a %b %d
time = %I:%M %p

format = <label>
label = %date%  %time%
label-foreground = ${colors.foreground}
