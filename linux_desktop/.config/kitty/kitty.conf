# ============================================================
# Kitty Config
# Warm dark modern terminal
# ============================================================

font_family JetBrains Mono
bold_font auto
italic_font auto
bold_italic_font auto

font_size 11.5

background #170d02
foreground #ffffff

selection_background #83cafa
selection_foreground #170d02

cursor #83cafa
cursor_text_color #170d02

url_color #83cafa

active_border_color #83cafa
inactive_border_color #333333
bell_border_color #ec69a0

active_tab_background #83cafa
active_tab_foreground #170d02
inactive_tab_background #222222
inactive_tab_foreground #8c8c8c

background_opacity 0.96
dynamic_background_opacity yes

window_padding_width 8
confirm_os_window_close 0

enable_audio_bell no

# Basic color palette
color0  #170d02
color1  #ec69a0
color2  #9ece6a
color3  #e0af68
color4  #83cafa
color5  #bb9af7
color6  #7dcfff
color7  #ffffff

color8  #444444
color9  #ec69a0
color10 #9ece6a
color11 #e0af68
color12 #83cafa
color13 #bb9af7
color14 #7dcfff
color15 #ffffff
