# starship.toml - Starship prompt configuration
format = """
$directory\
$git_branch\
$git_status\
$python\
$line_break\
$character"""

[directory]
truncation_length = 3
truncation_symbol = "…/"
read_only = " 🔒"

[git_branch]
symbol = "🌱 "
format = "on [$symbol$branch]($style) "
style = "bold magenta"

[git_status]
format = "([\\[$all_status$ahead_behind\\]]($style) )"
style = "bold red"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "

[python]
symbol = "🐍 "
format = "via [$symbol$venv]($style) "
style = "bold yellow"
