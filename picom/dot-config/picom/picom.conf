# ============================================================
# Picom Config
# Modern i3 compositor settings
# ============================================================

backend = "glx";
vsync = true;

# ------------------------------------------------------------
# Rounded corners
# ------------------------------------------------------------

corner-radius = 10;
round-borders = 1;
detect-rounded-corners = true;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];

# ------------------------------------------------------------
# Shadows
# ------------------------------------------------------------

shadow = true;
shadow-radius = 18;
shadow-opacity = 0.35;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@"
];

# ------------------------------------------------------------
# Fading
# ------------------------------------------------------------

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# ------------------------------------------------------------
# Opacity
# ------------------------------------------------------------

inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

detect-client-opacity = true;

opacity-rule = [
  "100:class_g = 'Firefox'",
  "100:class_g = 'kitty'",
  "100:class_g = 'Rofi'",
  "100:class_g = 'Polybar'"
];

# ------------------------------------------------------------
# Blur
# Kept off for stability. Enable later if wanted.
# ------------------------------------------------------------

blur-background = false;

# ------------------------------------------------------------
# General
# ------------------------------------------------------------

mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-ewmh-active-win = true;
unredir-if-possible = false;

focus-exclude = [
  "class_g = 'Cairo-clock'"
];

detect-transient = true;
detect-client-leader = true;

wintypes:
{
  tooltip = {
    fade = true;
    shadow = true;
    opacity = 0.95;
    focus = true;
  };

  dock = {
    shadow = false;
  };

  dnd = {
    shadow = false;
  };

  popup_menu = {
    opacity = 0.98;
  };

  dropdown_menu = {
    opacity = 0.98;
  };
};